<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE HUMAN LAB | TENSION SCAN [THL-SYS-02]</title>
    <style>
        :root {
            --concrete: #D1D1D1;
            --shadow: #1A1A1A;
            --lab-grey: #4A4A4A;
        }
        body {
            background-color: var(--concrete);
            color: var(--shadow);
            font-family: 'Courier New', Courier, monospace; /* Lab/Technical feel */
            text-transform: uppercase;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #lab-container {
            border: 2px solid var(--shadow);
            padding: 40px;
            max-width: 600px;
            background: white;
            box-shadow: 20px 20px 0px var(--lab-grey); /* Hard brutalist shadow */
        }
        h1 { font-size: 1.2rem; border-bottom: 2px solid var(--shadow); padding-bottom: 10px; }
        .diagnostic-step { margin-bottom: 30px; }
        input[type=range] { width: 100%; cursor: crosshair; }
        .btn {
            background: var(--shadow);
            color: white;
            padding: 15px 30px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
        }
        .btn:hover { background: var(--lab-grey); }
        .result-box { display: none; margin-top: 20px; border-top: 2px solid var(--shadow); }
    </style>
</head>
<body>

<div id="lab-container">
    <h1>INSTRUMENT: TENSION SCAN [THL-SYS-02]</h1>
    <p>OBJECTIVE: IDENTIFY INTERNAL LOAD-BEARING FAILURE POINTS.</p>
    
    <div id="scan-form">
        <div class="diagnostic-step">
            <label>01: OSCILLATION RATE (EXPANSION VS WITHDRAWAL)</label>
            <input type="range" min="1" max="10" value="5">
        </div>
        <!-- Additional questions here -->
        <button class="btn" onclick="runAnalysis()">RUN STRUCTURAL ANALYSIS</button>
    </div>

    <div id="results" class="result-box">
        <h2>DIAGNOSTIC COMPLETE</h2>
        <p id="archetype-result"></p>
        <p id="next-action" style="background: #eee; padding: 10px; border-left: 5px solid var(--shadow);">
            <strong>REQUIRED READING:</strong> PART TWO: STRUCTURAL LOAD-BEARING.
        </p>
        <a href="[LINK_TO_BOOK]" class="btn" style="text-decoration:none; display:block; text-align:center;">ACCESS THE BLUEPRINT</a>
    </div>
</div>

<script>
    function runAnalysis() {
        document.getElementById('scan-form').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        document.getElementById('archetype-result').innerText = "STRUCTURAL CATEGORY: BRITTLE MONOLITH. YOUR INTERNAL BEAMS ARE OPERATING AT 94% TENSION CAPACITY. COLLAPSE IS A LOGICAL NECESSITY WITHOUT RE-ARCHITECTURE.";
    }
</script>

</body>
</html>
